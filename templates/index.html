<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Audio Downloader</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark">
    <!-- Navigation -->
    <nav class="navbar navbar-dark bg-darker border-bottom border-secondary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-music text-success me-2"></i>
                <strong>Spotify Audio Downloader</strong>
            </a>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-success" id="refreshBtn" title="Refresh Songs">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="btn btn-sm btn-outline-warning" id="exportBtn" title="Export to TXT">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 mb-4">
                <div class="card bg-darker border-secondary">
                    <div class="card-header bg-secondary text-white">
                        <i class="fas fa-cog"></i> Fetch Songs
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="curlInput" class="form-label text-light">Paste Curl Command:</label>
                            <textarea class="form-control bg-dark border-secondary text-light" id="curlInput" rows="6" placeholder="Paste your curl command here..."></textarea>
                            <small class="text-muted d-block mt-2">Or load existing songs from songs.json</small>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button class="btn btn-success btn-sm" id="fetchBtn">
                                <i class="fas fa-cloud-download-alt"></i> Fetch from Curl
                            </button>
                            <button class="btn btn-info btn-sm" id="loadBtn">
                                <i class="fas fa-folder-open"></i> Load Existing Songs
                            </button>
                        </div>

                        <hr class="border-secondary">

                        <div>
                            <label class="form-label text-light"><i class="fas fa-list"></i> Quick Actions:</label>
                            <div class="btn-group-vertical w-100" role="group">
                                <button class="btn btn-outline-warning btn-sm" id="downloadSelectedBtn">
                                    <i class="fas fa-download"></i> Download Selected
                                </button>
                                <button class="btn btn-outline-info btn-sm" id="selectAllBtn">
                                    <i class="fas fa-check-square"></i> Select All
                                </button>
                                <button class="btn btn-outline-secondary btn-sm" id="deselectAllBtn">
                                    <i class="fas fa-square"></i> Deselect All
                                </button>
                            </div>
                        </div>

                        <hr class="border-secondary">

                        <div>
                            <label class="form-label text-light"><i class="fas fa-filter"></i> Filter:</label>
                            <input type="text" class="form-control form-control-sm bg-dark border-secondary text-light" id="searchInput" placeholder="Search songs...">
                        </div>

                        <hr class="border-secondary">

                        <div class="text-center">
                            <small class="text-muted">
                                <span id="songCount">0</span> songs loaded
                            </small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-lg-9">
                <!-- Status Alert -->
                <div id="statusAlert" class="alert alert-info alert-dismissible fade show d-none" role="alert">
                    <i class="fas fa-info-circle"></i>
                    <span id="statusMessage"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Songs Table -->
                <div class="card bg-darker border-secondary">
                    <div class="card-header bg-secondary text-white">
                        <i class="fas fa-music"></i> Songs List
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-dark table-hover mb-0">
                                <thead class="table-secondary">
                                    <tr>
                                        <th width="5%">
                                            <input type="checkbox" class="form-check-input" id="selectAllCheckbox">
                                        </th>
                                        <th width="40%">Song Name</th>
                                        <th width="30%">Artist</th>
                                        <th width="15%">Status</th>
                                        <th width="10%">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="songsTableBody">
                                    <tr>
                                        <td colspan="5" class="text-center text-muted py-5">
                                            <i class="fas fa-inbox"></i> No songs loaded. Fetch or load songs to get started.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <!-- Pagination -->
                    <div class="card-footer bg-darker border-top border-secondary">
                        <div id="paginationContainer"></div>
                    </div>
                </div>

                <!-- Downloaded Songs Player -->
                <div class="card bg-darker border-secondary mt-4">
                    <div class="card-header bg-secondary text-white">
                        <i class="fas fa-headphones"></i> Downloaded Songs Player
                    </div>
                    <div class="card-body">
                        <div id="playerContainer" class="text-center text-muted">
                            <i class="fas fa-music fa-3x mb-3"></i>
                            <p>No downloaded songs yet</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner Modal -->
    <div class="modal" id="loadingModal" tabindex="-1" backdrop="static" keyboard="false">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content bg-darker border-secondary">
                <div class="modal-body text-center py-4">
                    <div class="spinner-border text-success mb-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="text-light" id="loadingText">Processing...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Player Modal -->
    <div class="modal fade" id="playerModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-darker border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-light" id="playerTitle">Now Playing</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <audio id="audioPlayer" controls class="w-100" style="background: var(--bs-dark);">
                        Your browser does not support the audio element.
                    </audio>
                    <div class="mt-3 text-center">
                        <small class="text-muted" id="playerInfo"></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
